<!-- GUESTBOOK SECTION — replace existing h2 Guestbook block -->

<h2>Guestbook</h2>

<p>Contribute your sense of an ending.</p>

<div class="guestbook-form-wrap" id="guestbook-form-wrap">
  <div class="guestbook-field">
    <label class="guestbook-label" for="gb-name">
      <span class="prompt-char">$</span> name <span class="guestbook-optional">(optional)</span>
    </label>
    <input type="text" id="gb-name" class="guestbook-input" maxlength="100"
           placeholder="anonymous" autocomplete="off">
  </div>

  <div class="guestbook-field">
    <label class="guestbook-label" for="gb-url">
      <span class="prompt-char">$</span> link to something you'd like to share <span class="guestbook-optional">(optional)</span>
    </label>
    <input type="url" id="gb-url" class="guestbook-input" maxlength="500"
           placeholder="https://" autocomplete="off">
  </div>

  <div class="guestbook-field">
    <label class="guestbook-label" for="gb-response">
      <span class="prompt-char">$</span> how would you begin?
    </label>
    <textarea id="gb-response" class="guestbook-input guestbook-textarea"
              maxlength="1000" rows="4" placeholder=""></textarea>
  </div>

  <div class="guestbook-actions">
    <button type="button" id="gb-submit" class="guestbook-submit">
      Submit<span class="cursor-blink"></span>
    </button>
    <span class="guestbook-status" id="gb-status" aria-live="polite"></span>
  </div>
</div>

<noscript>
  <p class="guestbook-noscript">The guestbook requires JavaScript to submit and display entries. 
  You can also visit the <a href="contributing.html">Contributing</a> page to leave feedback via GitHub.</p>
</noscript>

<hr class="section-rule">

<div class="guestbook-entries" id="guestbook-entries">
  <p class="guestbook-loading" id="gb-loading">
    <span class="prompt-char">$</span> loading entries<span class="cursor-blink"></span>
  </p>
</div>
